<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic Gold Gradient (more sophisticated) -->
    <linearGradient id="metalGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A961;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.4" flood-color="#000000"/>
    </filter>
    
    <!-- Text shadow -->
    <filter id="textShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.6" flood-color="#000000"/>
    </filter>
  </defs>
  
  <!-- Black Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#000000" filter="url(#shadow)"/>
  
  <!-- Subtle inner glow -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#C9A961" stroke-width="1" opacity="0.3"/>
  
  <!-- NCT Text - N and T in Gold, C in White -->
  <g filter="url(#textShadow)">
    <!-- N in Gold -->
    <text x="65" y="130" font-family="Arial, Helvetica, sans-serif" font-size="85" font-weight="900" fill="url(#metalGold)" text-anchor="middle" letter-spacing="0">
      N
    </text>
    
    <!-- C in White -->
    <text x="100" y="130" font-family="Arial, Helvetica, sans-serif" font-size="85" font-weight="900" fill="white" text-anchor="middle" letter-spacing="0">
      C
    </text>
    
    <!-- T in Gold -->
    <text x="135" y="130" font-family="Arial, Helvetica, sans-serif" font-size="85" font-weight="900" fill="url(#metalGold)" text-anchor="middle" letter-spacing="0">
      T
    </text>
  </g>
  
  <!-- Subtitle - Business Name -->
  <text x="100" y="160" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#C9A961" text-anchor="middle" opacity="0.8" letter-spacing="1.5" font-weight="600">
    NEXCRAFT TECH
  </text>
</svg>