<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metalGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A961;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Black Background -->
  <circle cx="100" cy="100" r="95" fill="#000000"/>
  
  <!-- Inner glow -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#C9A961" stroke-width="1" opacity="0.3"/>
  
  <!-- NCT Text - Professional -->
  <g>
    <text x="65" y="130" font-family="Arial, Helvetica, sans-serif" font-size="85" font-weight="900" fill="url(#metalGold)" text-anchor="middle">
      N
    </text>
    <text x="100" y="130" font-family="Arial, Helvetica, sans-serif" font-size="85" font-weight="900" fill="white" text-anchor="middle">
      C
    </text>
    <text x="135" y="130" font-family="Arial, Helvetica, sans-serif" font-size="85" font-weight="900" fill="url(#metalGold)" text-anchor="middle">
      T
    </text>
  </g>
</svg>